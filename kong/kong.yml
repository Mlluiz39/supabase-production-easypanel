        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-connection-encrypted
            - Prefer
            - Prefer-Transaction
          exposed_headers:
            - Content-Range
            - X-Content-Range
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false

  - name: realtime-v1
    url: http://realtime:4000/realtime/v1
    routes:
      - name: realtime-v1-ws
        paths:
          - /realtime/v1
        strip_path: false
        protocols:
          - http
          - https
          - ws
          - wss

  - name: storage-v1
