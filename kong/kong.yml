# Kong Declarative Configuration — Supabase Routes
# Based on upstream supabase/kong config with production adjustments

_format_version: "3.0"
_transform: true

services:
  - name: auth-v1
    url: http://auth:9999/auth/v1
    routes:
      - name: auth-v1-all
        paths:
          - /auth/v1
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-connection-encrypted
          exposed_headers:
            - Content-Range
            - X-Content-Range
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false

  - name: auth-v1-admin
    url: http://auth:9999/auth/v1
    routes:
      - name: auth-v1-admin-all
        paths:
          - /auth/v1/admin
          - /auth/v1/audience
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-connection-encrypted
          exposed_headers:
            - Content-Range
            - X-Content-Range
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false

  - name: auth-v1-callback
    url: http://auth:9999/auth/v1
    routes:
      - name: auth-v1-callback
        paths:
          - /auth/v1/callback
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-connection-encrypted
          exposed_headers:
            - Content-Range
            - X-Content-Range
          max_age: 3600
          credentials: true

  - name: rest-v1
