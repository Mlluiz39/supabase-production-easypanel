# Alertmanager configuration — Supabase Production
route:
  receiver: default
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    email_configs:
      - to: "{{ .ExternalURL }}"
        send_resolved: true

  - name: critical
    email_configs:
      - to: "{{ .ExternalURL }}"
        send_resolved: true
    webhook_configs:
      - url: "{{ .ExternalURL }}"
        send_resolved: true
