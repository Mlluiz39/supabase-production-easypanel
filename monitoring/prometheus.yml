# Prometheus configuration — Supabase Production
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert rules
rule_files:
  - "prometheus-rules.yml"

scrape_configs:
  # Node Exporter — host metrics (CPU, RAM, disk, network)
  - job_name: node
    scrape_interval: 15s
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: system

  # PostgreSQL Exporter — database metrics
  - job_name: postgres
    scrape_interval: 15s
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: database
    params:
      auth_module: [docker]

  # Kong — API Gateway metrics
  - job_name: kong
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets:
          - kong:8001
        labels:
          service: gateway

  # Supavisor — connection pooler metrics
  - job_name: supavisor
    scrape_interval: 30s
    static_configs:
      - targets:
          - supavisor:4000
        labels:
          service: pooler

  # Prometheus itself
  - job_name: prometheus
    scrape_interval: 30s
    static_configs:
      - targets:
          - localhost:9090
