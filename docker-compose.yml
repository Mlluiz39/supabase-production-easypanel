# Supabase Production for EasyPanel
# Self-hosted Supabase stack with Cloudflare Tunnel
#
# Usage:
#   1. cp .env.example .env
#   2. ./scripts/generate-secrets.sh
#   3. ./scripts/install.sh
#   OR: docker compose up -d

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 5s
  timeout: 5s
  retries: 5
  start_period: 10s

x-db-depends: &db-depends
  db:
    condition: service_healthy

x-supavisor-depends: &supavisor-depends
  supavisor:
    condition: service_healthy

# ─── Network ───────────────────────────────────────────────
networks:
  supabase:
    name: supabase
    driver: bridge

# ─── Volumes ────────────────────────────────────────────────
volumes:
  db-data:
    name: supabase_db_data
  db-config:
    name: supabase_db_config
  storage-data:
    name: supabase_storage
  functions-data:
    name: supabase_functions
  deno-cache:
    name: supabase_deno_cache
  prometheus-data:
    name: supabase_prometheus
  grafana-data:
    name: supabase_grafana
  alertmanager-data:
    name: supabase_alertmanager

# ─── Services ───────────────────────────────────────────────
services:

  # ═══════════════════════════════════════════════════════════
  # Database Layer
  # ═══════════════════════════════════════════════════════════

  db:
    <<: *service-defaults
    container_name: supabase-db
    image: supabase/postgres:17.6.1.136
    networks:
      - supabase
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PORT: "5432"
      POSTGRES_HOST: "/var/run/postgresql"
    volumes:
      - db-data:/var/lib/postgresql/data
      - db-config:/etc/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "pg_isready", "-U", "postgres"]
    # No host port exposed — access via supavisor on Docker network

  supavisor:
    <<: *service-defaults
    container_name: supabase-supavisor
    image: supabase/supavisor:2.9.5
    networks:
      - supabase
    depends_on:
      <<: *db-depends
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PORT: "5432"
      POSTGRES_HOST: db
      POOLER_PROXY_PORT_TRANSACTION: "6543"
      POOLER_DEFAULT_POOL_SIZE: ${POOLER_DEFAULT_POOL_SIZE:-20}
      POOLER_MAX_CLIENT_CONN: ${POOLER_MAX_CLIENT_CONN:-100}
      POOLER_TENANT_ID: ${POOLER_TENANT_ID:-supabase-tenant}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "postgres"]
    # No host port exposed — internal Docker network access only

  # ═══════════════════════════════════════════════════════════
  # Core Services
  # ═══════════════════════════════════════════════════════════

  auth:
    <<: *service-defaults
    container_name: supabase-auth
    image: supabase/gotrue:v2.189.0
    networks:
      - supabase
    depends_on:
      <<: *supavisor-depends
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supavisor:6543/${POSTGRES_DB:-postgres}"
      GOTRUE_DB_MAX_POOL_SIZE: ${GOTRUE_DB_MAX_POOL_SIZE:-20}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXPIRY: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: "authenticated"
      GOTRUE_JWT_AUD: "authenticated"
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${GOTRUE_EXTERNAL_EMAIL_ENABLED:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-false}
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "true"
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Supabase}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GOTRUE_EXTERNAL_GITHUB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GOTRUE_EXTERNAL_GITHUB_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GOTRUE_EXTERNAL_GITHUB_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOTRUE_EXTERNAL_GOOGLE_SECRET:-}
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: "true"
      GOTRUE_SECURITY_MANUAL_LINKING_ENABLED: "true"
      VAULT_ENC_KEY: ${VAULT_ENC_KEY}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9999/auth/v1/health"]

  rest:
    <<: *service-defaults
    container_name: supabase-rest
    image: postgrest/postgrest:v14.12
    networks:
      - supabase
    depends_on:
      <<: *supavisor-depends
    environment:
      PGRST_DB_URI: "postgres://authenticator:${POSTGRES_PASSWORD}@supavisor:6543/${POSTGRES_DB:-postgres}"
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_POOL: ${PGRST_DB_POOL:-10}
      PGRST_SERVER_PORT: "3000"
      PGRST_ADMIN_SERVER_PORT: "3001"
      PGRST_LOG_LEVEL: ${PGRST_LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:3000/rest/v1/"]

  realtime:
    <<: *service-defaults
    container_name: supabase-realtime
    image: supabase/realtime:v2.102.3
    networks:
      - supabase
    depends_on:
      <<: *supavisor-depends
    environment:
      DB_HOST: supavisor
      DB_PORT: "6543"
      DB_USER: "supabase_realtime_admin"
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_SSL: "false"
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PORT: "4000"
      TENANT_ID: ${POOLER_TENANT_ID:-supabase-tenant}
      REPLICATION_SLOT_POLL_INTERVAL_MS: "5000"
      MAX_REPLICATION_SLOTS: "10"
      SLOT_NAME: "supabase_realtime_rls"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:4000/realtime/v1/health"]

  storage:
    <<: *service-defaults
    container_name: supabase-storage
    image: supabase/storage-api:v1.60.4
    networks:
      - supabase
    depends_on:
      <<: *supavisor-depends
      rest:
        condition: service_healthy
      imgproxy:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supavisor:6543/${POSTGRES_DB:-postgres}"
      DB_POOL_SIZE: ${STORAGE_DB_POOL_SIZE:-10}
      POSTGREST_URL: "http://rest:3000"
      TENANT_ID: ${POOLER_TENANT_ID:-supabase-tenant}
      REGION: ${STORAGE_REGION:-local}
      GLOBAL_S3_BUCKET: ${STORAGE_BUCKET:-supabase-storage}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-file}
      FILE_STORAGE_BACKEND_PATH: "/var/lib/storage"
      FILE_SIZE_LIMIT: ${STORAGE_FILE_SIZE_LIMIT:-52428800}
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      IMGPROXY_URL: "http://imgproxy:5001"
      REQUEST_ALLOW_X_INIT_HEADERS: "x-upsert"
      PGRST_JWT_SECRET: ${JWT_SECRET}
      ENABLE_IMAGE_TRANSFORMATION: "true"
    volumes:
      - storage-data:/var/lib/storage
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5000/storage/v1/health"]

  imgproxy:
    <<: *service-defaults
    container_name: supabase-imgproxy
    image: darthsim/imgproxy:v3.30.1
    networks:
      - supabase
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY:-}
      IMGPROXY_SALT: ${IMGPROXY_SALT:-}
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]

  meta:
    <<: *service-defaults
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.96.6
    networks:
      - supabase
    depends_on:
      <<: *supavisor-depends
    environment:
      PG_META_DB_URL: "postgres://supabase_admin:${POSTGRES_PASSWORD}@supavisor:6543/${POSTGRES_DB:-postgres}"
      PG_META_PORT: "8080"
      PG_META_DB_MAX_POOL_SIZE: ${PG_META_DB_MAX_POOL_SIZE:-5}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
      PG_META_JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]

  functions:
    <<: *service-defaults
    container_name: supabase-functions
    image: supabase/edge-runtime:v1.74.0
    networks:
      - supabase
    depends_on:
      <<: *supavisor-depends
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: "postgres://postgres:${POSTGRES_PASSWORD}@supavisor:6543/${POSTGRES_DB:-postgres}"
      VERIFY_JWT: "true"
    volumes:
      - functions-data:/home/deno/functions:ro
      - deno-cache:/root/.cache
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9000/functions/v1/health"]

  # ═══════════════════════════════════════════════════════════
  # API Gateway
  # ═══════════════════════════════════════════════════════════

  kong:
    <<: *service-defaults
    container_name: supabase-kong
    image: kong/kong:3.9.1
    networks:
      - supabase
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_healthy
      realtime:
        condition: service_healthy
      storage:
        condition: service_healthy
      meta:
        condition: service_healthy
      functions:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL:-notice}
      KONG_PLUGINS: "bundled,cors,key-auth"
      KONG_NGINX_HTTP_CLIENT_MAX_BODY_SIZE: "${KONG_CLIENT_MAX_BODY_SIZE:-50m}"
      # Pass ANON_KEY and SERVICE_ROLE_KEY for envsubst in kong.yml template
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./kong/kong.yml:/tmp/kong.template.yml:ro
    command: >
      /bin/sh -c
      "envsubst '$${ANON_KEY} $${SERVICE_ROLE_KEY}' < /tmp/kong.template.yml > /tmp/kong.yml
      && kong docker-start"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "kong", "health"]
      retries: 10

  # ═══════════════════════════════════════════════════════════
  # Dashboard
  # ═══════════════════════════════════════════════════════════

  studio:
    <<: *service-defaults
    container_name: supabase-studio
    image: supabase/studio:2026.06.03-sha-0bca601
    networks:
      - supabase
    depends_on:
      kong:
        condition: service_healthy
      meta:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: "http://meta:8080"
      STUDIO_DEFAULT_ORGANIZATION: ${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}
      STUDIO_DEFAULT_PROJECT: ${STUDIO_DEFAULT_PROJECT:-Default Project}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: "6543"
      POSTGRES_HOST: supavisor
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      STUDIO_PORT: "3000"
      NEXT_PUBLIC_SITE_URL: ${STUDIO_URL}
      NEXT_PUBLIC_API_URL: ${SUPABASE_PUBLIC_URL}
      IS_PLATFORM: "false"
      NEXT_PUBLIC_IS_PLATFORM: "false"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]

  # ═══════════════════════════════════════════════════════════
  # Observability
  # ═══════════════════════════════════════════════════════════

  vector:
    <<: *service-defaults
    container_name: supabase-vector
    image: timberio/vector:0.45.0-debian
    networks:
      - supabase
    environment:
      VECTOR_CONFIG: /etc/vector/vector.toml
      VECTOR_REQUIRE_HEALTHY: "true"
    volumes:
      - ./monitoring/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8686/health"]
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # Monitoring — Prometheus + Grafana (profile: monitoring)
  # ═══════════════════════════════════════════════════════════

  prometheus:
    <<: *service-defaults
    container_name: supabase-prometheus
    image: prom/prometheus:v3.2.1
    networks:
      - supabase
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "http://localhost:9090/-/healthy"]
      start_period: 15s

  grafana:
    <<: *service-defaults
    container_name: supabase-grafana
    image: grafana/grafana:11.5.2
    networks:
      - supabase
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "http://localhost:3000/api/health"]
      retries: 10
      start_period: 30s

  node-exporter:
    <<: *service-defaults
    container_name: supabase-node-exporter
    image: prom/node-exporter:v1.9.1
    networks:
      - supabase
    profiles:
      - monitoring
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    pid: host
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres-exporter:
    <<: *service-defaults
    container_name: supabase-pg-exporter
    image: prometheuscommunity/postgres-exporter:v0.17.1
    networks:
      - supabase
    profiles:
      - monitoring
    environment:
      DATA_SOURCE_NAME: "postgresql://supabase_admin:${POSTGRES_PASSWORD}@supavisor:6543/postgres?sslmode=disable&application_name=pg_exporter"
    depends_on:
      supavisor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    <<: *service-defaults
    container_name: supabase-alertmanager
    image: prom/alertmanager:v0.28.1
    networks:
      - supabase
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "http://localhost:9093/-/healthy"]
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # Admin Panel — Go (profile: admin)
  # ═══════════════════════════════════════════════════════════

  admin:
    <<: *service-defaults
    container_name: supabase-admin
    build:
      context: ./go-service
      dockerfile: Dockerfile
    networks:
      - supabase
    profiles:
      - admin
    environment:
      ADMIN_PORT: "8080"
      ADMIN_REFRESH_SEC: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./backups:/app/backups:ro
    working_dir: /app
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "http://localhost:8080/api/health"]

  # ═══════════════════════════════════════════════════════════
  # Cloudflare Tunnel
  # ═══════════════════════════════════════════════════════════

  cloudflared:
    <<: *service-defaults
    container_name: supabase-cloudflared
    image: cloudflare/cloudflared:2025.6.0
    networks:
      - supabase
    profiles:
      - cloudflare
    depends_on:
      kong:
        condition: service_healthy
      studio:
        condition: service_healthy
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel run
    # Healthcheck: cloudflared exits if tunnel fails to establish
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      test: ["CMD", "cloudflared", "tunnel", "info"]
